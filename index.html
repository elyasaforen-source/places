<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f8f9ff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Places</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>

  <!-- ── Main Screen ────────────────────────────────────────── -->
  <div id="screen-main" class="screen active">
    <!-- Top bar -->
    <header class="top-bar">
      <span class="top-wordmark">Places</span>
    </header>

    <!-- Map view -->
    <div id="view-map" class="view" style="display:none">
      <div id="map"></div>
      <div class="map-actions">
        <button class="map-add-btn" onclick="openAddPlace()" title="Add this place">
          <span class="material-symbols-outlined">add_location_alt</span>
        </button>
        <button class="locate-btn" id="locate-btn" onclick="locateMe()" title="My location">
          <span class="material-symbols-outlined">my_location</span>
        </button>
      </div>
    </div>

    <!-- Browse view -->
    <div id="view-browse" class="view view-browse">
      <div class="browse-controls">
        <span class="browse-total" id="browse-total"></span>
        <button class="browse-ctrl-btn" id="near-me-btn" onclick="toggleNearMe()">
          <span class="material-symbols-outlined" style="font-size:16px;vertical-align:-3px">near_me</span>
          Near me
        </button>
        <button class="browse-ctrl-btn" id="select-btn" onclick="toggleSelectMode()">Select</button>
      </div>
      <div class="browse-list" id="browse-list">
        <div class="empty-state">
          <span class="material-symbols-outlined empty-icon">explore</span>
          <p>No places yet</p>
          <small>Tap + to save your first place</small>
        </div>
      </div>
    </div>

    <!-- Floating bottom nav -->
    <nav class="bottom-nav">
      <button class="nav-item active" id="tab-browse" onclick="switchTab('browse')">
        <span class="material-symbols-outlined nav-icon">bookmark</span>
        <span class="nav-label">Browse</span>
      </button>
      <button class="nav-item" id="tab-map" onclick="switchTab('map')">
        <span class="material-symbols-outlined nav-icon">map</span>
        <span class="nav-label">Map</span>
      </button>
      <button class="nav-add-btn" onclick="openAddPlace()" title="Add place">
        <span class="material-symbols-outlined">add</span>
      </button>
      <button class="nav-item" id="nav-settings" onclick="openSettings()">
        <span class="material-symbols-outlined nav-icon">settings</span>
        <span class="nav-label">Settings</span>
      </button>
    </nav>
  </div>

  <!-- ── Add Place Overlay ──────────────────────────────────── -->
  <div id="screen-add" class="screen-overlay">
    <div class="overlay-header">
      <button class="hdr-btn" onclick="closeAddPlace()">
        <span class="material-symbols-outlined">close</span>
      </button>
      <span class="overlay-title">Save Place</span>
      <button class="hdr-btn hdr-btn-primary" id="btn-save-place" onclick="savePlace()">Save</button>
    </div>
    <div class="overlay-body">

      <!-- Mode toggle -->
      <div class="add-mode-tabs">
        <button class="mode-tab active" id="mode-tab-here" onclick="setAddMode('here')">
          <span class="material-symbols-outlined" style="font-size:16px;vertical-align:-3px">location_on</span>
          I'm here
        </button>
        <button class="mode-tab" id="mode-tab-search" onclick="setAddMode('search')">
          <span class="material-symbols-outlined" style="font-size:16px;vertical-align:-3px">search</span>
          Search place
        </button>
      </div>

      <!-- GPS / mini map -->
      <div class="mini-map-wrap" id="mini-map-wrap">
        <div id="add-map" class="mini-map"></div>
        <div class="location-bar">
          <span class="material-symbols-outlined loc-icon">location_pin</span>
          <div>
            <div id="loc-city" class="loc-city">Detecting location…</div>
            <div id="loc-coords" class="loc-coords"></div>
          </div>
        </div>
      </div>

      <!-- Search -->
      <div id="search-section" class="search-section" style="display:none">
        <div class="search-input-wrap">
          <span class="material-symbols-outlined search-icon-inner">search</span>
          <input type="text" id="place-search-input" class="place-search-input"
                 placeholder="Restaurant, café, museum…" autocomplete="off">
          <button class="search-clear-btn" onclick="clearSearch()">
            <span class="material-symbols-outlined" style="font-size:16px">close</span>
          </button>
        </div>
        <div id="search-results" class="search-results"></div>
      </div>

      <div class="form-section">
        <label class="form-label">Note</label>
        <textarea id="place-note" class="form-textarea"
          placeholder="What is this place? Why are you saving it?"></textarea>
      </div>

      <div class="form-section">
        <label class="form-label">Category</label>
        <div class="cat-picker" id="cat-picker"></div>
        <button class="add-cat-btn" onclick="openCategoryModal()">+ New category</button>
      </div>

      <div class="form-section">
        <label class="form-label">Photos</label>
        <div class="photo-row">
          <div id="photo-thumbs"></div>
          <label class="photo-add-btn">
            <span class="material-symbols-outlined" style="font-size:22px">add_a_photo</span>
            <span>Add</span>
            <input type="file" id="photo-input" accept="image/*" capture="environment" multiple>
          </label>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Detail Overlay ────────────────────────────────────── -->
  <div id="screen-detail" class="screen-overlay">
    <div class="detail-hero-wrap">
      <div id="detail-photos" class="detail-photos-strip"></div>
      <div class="detail-hero-overlay">
        <button class="detail-back-btn" onclick="closeDetail()">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <span class="detail-cat-chip" id="detail-cat-label"></span>
        <button class="detail-delete-btn" onclick="deleteCurrentPlace()">
          <span class="material-symbols-outlined">delete</span>
        </button>
      </div>
    </div>
    <div class="overlay-body detail-overlay-body">
      <div class="detail-location-row">
        <span id="detail-city" class="detail-city"></span>
        <span id="detail-country" class="detail-country"></span>
      </div>
      <p id="detail-note" class="detail-note"></p>
      <div id="detail-date" class="detail-date"></div>
      <button class="maps-btn" onclick="openInMaps()">
        <span class="material-symbols-outlined" style="font-size:18px">open_in_new</span>
        Open in Google Maps
      </button>
    </div>
  </div>

  <!-- ── Settings Overlay ───────────────────────────────────── -->
  <div id="screen-settings" class="screen-overlay">
    <div class="overlay-header">
      <button class="hdr-btn" onclick="closeSettings()">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <span class="overlay-title">Personal Vault</span>
      <div style="width:44px"></div>
    </div>
    <div class="overlay-body">

      <!-- Stats bento -->
      <div class="settings-section">
        <div class="settings-section-title">Your Journey</div>
        <div id="settings-stats" class="stats-bento"></div>
      </div>

      <!-- Categories -->
      <div class="settings-section">
        <div class="settings-section-title">Categories</div>
        <div id="settings-cats"></div>
        <button class="settings-action-btn" onclick="openCategoryModal()">
          <span class="material-symbols-outlined" style="font-size:18px;vertical-align:-4px">add</span>
          Add Category
        </button>
      </div>

      <!-- Version -->
      <div class="settings-section">
        <div class="settings-version-row">
          <span class="settings-version-label">Places</span>
          <span class="settings-version-badge">v2.1</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Category Modal ────────────────────────────────────── -->
  <div id="modal-cat" class="modal-backdrop">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">New Category</div>
      <input type="text" id="cat-name-input" class="modal-input" placeholder="e.g. Café, Park, Gym…">
      <div class="form-label" style="margin-bottom:12px">Icon</div>
      <div class="emoji-grid" id="emoji-grid">
        <span class="emoji-opt selected" data-emoji="📍">📍</span>
        <span class="emoji-opt" data-emoji="🍕">🍕</span>
        <span class="emoji-opt" data-emoji="🍣">🍣</span>
        <span class="emoji-opt" data-emoji="🍺">🍺</span>
        <span class="emoji-opt" data-emoji="☕">☕</span>
        <span class="emoji-opt" data-emoji="🏋️">🏋️</span>
        <span class="emoji-opt" data-emoji="🛍️">🛍️</span>
        <span class="emoji-opt" data-emoji="🏖️">🏖️</span>
        <span class="emoji-opt" data-emoji="🏛️">🏛️</span>
        <span class="emoji-opt" data-emoji="🎭">🎭</span>
        <span class="emoji-opt" data-emoji="🌿">🌿</span>
        <span class="emoji-opt" data-emoji="⭐">⭐</span>
        <span class="emoji-opt" data-emoji="🎯">🎯</span>
        <span class="emoji-opt" data-emoji="🏨">🏨</span>
        <span class="emoji-opt" data-emoji="💊">💊</span>
        <span class="emoji-opt" data-emoji="✈️">✈️</span>
      </div>
      <div class="form-label" style="margin:16px 0 12px">Color</div>
      <div class="color-grid" id="color-grid">
        <span class="color-opt selected" data-color="#FF6B6B" style="background:#FF6B6B"></span>
        <span class="color-opt" data-color="#FF9F43" style="background:#FF9F43"></span>
        <span class="color-opt" data-color="#FFEAA7" style="background:#FFEAA7"></span>
        <span class="color-opt" data-color="#96CEB4" style="background:#96CEB4"></span>
        <span class="color-opt" data-color="#4ECDC4" style="background:#4ECDC4"></span>
        <span class="color-opt" data-color="#45B7D1" style="background:#45B7D1"></span>
        <span class="color-opt" data-color="#A29BFE" style="background:#A29BFE"></span>
        <span class="color-opt" data-color="#DDA0DD" style="background:#DDA0DD"></span>
      </div>
      <div class="modal-actions">
        <button class="modal-cancel-btn" onclick="closeCategoryModal()">Cancel</button>
        <button class="modal-create-btn" onclick="createCategory()">Create</button>
      </div>
    </div>
  </div>

  <!-- ── Select bar ─────────────────────────────────────────── -->
  <div id="select-bar" class="select-bar" style="display:none">
    <span class="select-count" id="select-count">0 selected</span>
    <button class="select-delete-btn" id="select-delete-btn" onclick="deleteSelected()" disabled>Delete</button>
  </div>

  <!-- ── Toast ──────────────────────────────────────────────── -->
  <div id="toast" class="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="config.js?v=7"></script>
  <script src="app.js?v=7"></script>
</body>
</html>
